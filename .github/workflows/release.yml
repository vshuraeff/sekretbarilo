name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            os: macos
            rustflags: "-C target-cpu=x86-64-v2"
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macos
            rustflags: "-C target-cpu=apple-m1"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            rustflags: "-C target-cpu=x86-64-v2"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
            cross: true
            rustflags: "-C target-feature=+neon"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          # per-target RUSTFLAGS are set on the build steps below; do not override here
          rustflags: ""

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install cargo-deb
        if: matrix.os == 'linux'
        run: cargo install cargo-deb

      - name: Build .deb package
        if: matrix.os == 'linux'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo deb --no-build --target ${{ matrix.target }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../sekretbarilo-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz sekretbarilo
          cd ../../..

      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sekretbarilo-${{ matrix.target }}-tarball
          path: sekretbarilo-*.tar.gz
          if-no-files-found: error

      - name: Upload .deb
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sekretbarilo-${{ matrix.target }}-deb
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo vshuraeff/sekretbarilo \
            --pattern '*.tar.gz' \
            --dir tarballs/

      - name: Generate formula and push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"

          SHA_AARCH64_MACOS=$(sha256sum "tarballs/sekretbarilo-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_X86_64_MACOS=$(sha256sum "tarballs/sekretbarilo-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_AARCH64_LINUX=$(sha256sum "tarballs/sekretbarilo-${TAG}-aarch64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(sha256sum "tarballs/sekretbarilo-${TAG}-x86_64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)

          cat > formula.rb <<RUBY
          class Sekretbarilo < Formula
            desc "High-performance secret scanner for git workflows and AI coding agents"
            homepage "https://github.com/vshuraeff/sekretbarilo"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/vshuraeff/sekretbarilo/releases/download/${TAG}/sekretbarilo-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_MACOS}"
              else
                url "https://github.com/vshuraeff/sekretbarilo/releases/download/${TAG}/sekretbarilo-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MACOS}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/vshuraeff/sekretbarilo/releases/download/${TAG}/sekretbarilo-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "https://github.com/vshuraeff/sekretbarilo/releases/download/${TAG}/sekretbarilo-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "sekretbarilo"
            end

            test do
              assert_match "sekretbarilo #{version}", shell_output("#{bin}/sekretbarilo --version 2>&1")
            end
          end
          RUBY

          sed -i 's/^          //' formula.rb

          git clone "https://x-access-token:${GH_TOKEN}@github.com/vshuraeff/homebrew-tap.git" tap
          cp formula.rb tap/Formula/sekretbarilo.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sekretbarilo.rb
          git commit -m "sekretbarilo ${VERSION}"
          git push
